<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fr-simplecode</title>
	<link rel="icon" href="https://argentrocher.github.io/fr-simplecode/frc.ico" type="image/x-icon">

    <!-- Balise Google Search Console -->
    <meta name="google-site-verification" content="ARmCuvFztMbA89Omcf0HI7D5XbClbwwOximfATy6F5E" />

	<!-- JSZip pour créer le ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- FileSaver.js pour déclencher le téléchargement -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
			color: white;
			background:linear-gradient(135deg,#9b77d5,#592a9f);
			background-attachment: fixed;
			background-repeat: no-repeat;
			background-size: cover;
        }
		button:hover{
			transform:translateY(3px);
		}
        button.github-link {
            display: inline-block;
            padding: 15px 25px;
            background-color: #24292e;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
        }
        button.github-link:hover {
            background-color: #744c56;
        }
		button.wiki-link {
            display: inline-block;
            padding: 15px 35px;
            background-color: white;
            color: #24292e;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
        }
        button.wiki-link:hover {
            background-color: #c4ccf6;
        }
		button.download-btn {
            display: inline-block;
            padding: 15px 25px;
            background-color: #24292e;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
        }
		button.download-btn:hover {
            background-color: #447c56;
        }
		button.cancel-btn {
            display: inline-block;
            padding: 15px 25px;
            background-color: #24292e;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
        }
		button.cancel-btn:hover {
            background-color: #f2ae33;
        }
		@keyframes fade{
			from{
				opacity:0;
				transform:translateY(-20px);
			}
			to{
				opacity:1;
				transform:translateY(0);
			}
		}
		#downloadModal{
			display: none;
			position: fixed;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			width: 40%;
			min-width: 450px;
			height: 70%;
			min-height: 550px;
			background-color: white;
			color: black;
			border-radius:18px;
			text-align:center;
		}
		#downloadModalOption{
			text-align:left;
			padding: 8px 17px;
		}
    </style>
</head>
<body>
    <img src="https://argentrocher.github.io/fr-simplecode/frc.png" width="240" style="animation:fade 1s;">
    <h1>Bienvenue sur le site fr-simplecode GitHub Pages</h1>
	<br><br>
    <p style="font-size: 25px;"><strong>Vous pouvez accéder à mon dépôt GitHub ou télécharger la dernière version ici :</strong></p>
    <button class="github-link" onclick="window.location.href='https://github.com/argentrocher/fr-simplecode'" target="_blank">💻 Accéder au dépôt GitHub</button>
	
	<button class="download-btn" onclick="openDownloadWindow()">📦 Télécharger la dernière version (ZIP)</button>
	
	<br><br><br><br><br><br><br>
	<h1>Pour plus d'information :</h1>
	<button class="wiki-link" onclick="window.location.href='https://github.com/argentrocher/fr-simplecode/wiki'" target="_blank"><strong> 📝 Wiki </strong></button>

	<label style="position: fixed; bottom: 10px; left: 10px; font-size: 15px;">Par argentropcher, asigné au compte Google argentropcher, tous droits réservés</label>
	<label style="position: fixed; bottom: 10px; right: 10px; font-size: 15px;">Windows System only</label>
	
	<div id="downloadModal">
	<h1 style="font-size: clamp(14px,1.3vw,20px);">Télécharger fr-simplecode</h1>
	<div id="downloadModalOption">
	<h2>Options :</h2>
	
	<label style="font-size: clamp(14px,1.3vw,20px);">
	<input type="checkbox" id="math" style="transform: scale(1.8);" checked>
	Bibliothèque math+timelibrairy.frc
	<br>
	<small>
	Fonctions mathématiques, temps...
	</small>
	</label>
	
	<br><br>
	
	<label style="font-size: clamp(14px,1.3vw,20px);">
	<input type="checkbox" id="frc_utilitaire" style="transform: scale(1.8);" checked>
	Bibliothèque frc_utilitaire
	<br>
	<small>
	Fonctions de lecture fichier, couleur du cmd, appel système Windows ...
	</small>
	</label>
	
	<ul>
	<li>
	<label style="font-size: clamp(14px,1.3vw,20px);">
	<input type="checkbox" id="os" style="transform: scale(1.8);" checked>
	Bibliothèque os.frc
	<br>
	<small>
	Fonctions de lecture écriture de fichier texte.
	</small>
	</label>
	</li>
	
	<li>
	<label style="font-size: clamp(14px,1.3vw,20px);">
	<input type="checkbox" id="cmd_color" style="transform: scale(1.8);" checked>
	Bibliothèque cmd_color.frc
	<br>
	<small>
	Fonctions de manipulation des couleurs du cmd Windows.
	</small>
	</label>
	</li>
	
	<li>
	<label style="font-size: clamp(14px,1.3vw,20px);">
	<input type="checkbox" id="service" style="transform: scale(1.8);" checked>
	Bibliothèque service.frc
	<br>
	<small>
	Les appels systèmes à toutes les fonctions de microsofts sont possible<br>(ne pas utiliser en ligne).
	</small>
	</label>
	</li>
	
	</ul>
	
	<label style="font-size: clamp(14px,1.3vw,20px);">
	<input type="checkbox" id="exemple" style="transform: scale(1.8);" checked>
	Ficher d'exemple de script
	<br>
	<small>
	Exemple de script fr-simplecode.
	</small>
	</label>
	
	</div>
	
	<br>
	
	<button style="font-size: clamp(15px,1.2vw,20px);" class="cancel-btn" onclick="closeDownloadWindow()">Annuler</button>
	<button style="font-size: clamp(15px,1.2vw,20px);" class="download-btn" onclick="downloadZip()">Télécharger</button>
	</div>
	
    <script>
		const utilitaire = document.getElementById("frc_utilitaire");

		const enfants = [
			document.getElementById("os"),
			document.getElementById("cmd_color"),
			document.getElementById("service")
		];

		utilitaire.addEventListener("change", function () {
			enfants.forEach(c => {
				c.checked = utilitaire.checked;
			});
		});
		
		enfants.forEach(c => {
			c.addEventListener("change", function () {
				utilitaire.checked = enfants.every(x => x.checked);
			});

		});
	
	
        async function downloadZip() {
            const zip = new JSZip();

            // Chaque élément peut être :
            // - Un fichier texte (name + content)
            // - Un fichier binaire (name + url)
            // - Un dossier (name + files: [])
            const filesToInclude = [
                {
                    name: "INFO.txt",
                    content: "Ce ZIP contient uniquement des fichier de mon github !\n\nWiki sur https://github.com/argentrocher/fr-simplecode/wiki \n\n\nBy argentropcher"
                },
                {
                    name: "fr-simplecode0.4.1.exe",
                    url: "https://argentrocher.github.io/fr-simplecode/fr-simplecode0.4.1.exe"
                },
				{
                    name: "frc.ico",
                    url: "https://argentrocher.github.io/fr-simplecode/frc.ico"
                },
				{
                    name: "frc.png",
                    url: "https://argentrocher.github.io/fr-simplecode/frc.png"
                },
				{
                    name: "fr-simplecode_instal_frc.ps1",
                    url: "https://argentrocher.github.io/fr-simplecode/fr-simplecode_instal_frc.ps1"
                }, 
				{
                    name: "frc_notepad.xml",
                    url: "https://argentrocher.github.io/fr-simplecode/frc_notepad.xml"
                },
				{
                    name: "libwinpthread-1.dll",
                    url: "https://argentrocher.github.io/fr-simplecode/libwinpthread-1.dll"
                }];
				
			if(document.getElementById("exemple").checked){
				filesToInclude.push({
					name: "expemple__de_commande_fr-simplecode.txt",
					url: "https://argentrocher.github.io/fr-simplecode/expemple__de_commande_fr-simplecode.txt"
				});
			}
			
            filesToInclude.push({
                    name: "lib_frc/",
                    files: [
                        {
                            name: "register_web_frc.txt",
                            content: "\n"
                        }
                    ]
                },
				{
                    name: "lib_frc/web_include/",
                    files: [
                        {
                            name: "web_ressource.info",
                            content: "\n"
                        }
                    ]
                });
				
				
            if(document.getElementById("exemple").checked){
				filesToInclude.push({
                    name: "lib_frc/lib/",
                    files: [
                        {
                            name: "math+timelibrairy.frc",
                            url: "https://argentrocher.github.io/fr-simplecode/exemple_script_0.4/math+timelibrairy.frc"
                        }
                    ]
                });
			}
            if(document.getElementById("os").checked ||
				document.getElementById("cmd_color").checked ||
				document.getElementById("service").checked){

				const dossier={
					name:"lib_frc/lib/frc_utilitaire",
					files:[ ]
				};    
				
				if(document.getElementById("os").checked){
					dossier.files.push({
                            name: "os.frc",
                            url: "https://argentrocher.github.io/fr-simplecode/exemple_script_0.4/frc_utilitaire/os.frc"
                        },
						{
							name: "frc_os.dll",
							url: "https://argentrocher.github.io/fr-simplecode/exemple_script_0.4/frc_utilitaire/frc_os.dll"
						});
				}
				if(document.getElementById("cmd_color").checked){
					dossier.files.push({
							name: "cmd_color.frc",
							url: "https://argentrocher.github.io/fr-simplecode/exemple_script_0.4/frc_utilitaire/cmd_color.frc"
						},
						{
							name: "cmd_color.param",
							url: "https://argentrocher.github.io/fr-simplecode/exemple_script_0.4/frc_utilitaire/cmd_color.param"
						});
				}
				if(document.getElementById("service").checked){
					dossier.files.push({
                            name: "service.frc",
                            url: "https://argentrocher.github.io/fr-simplecode/exemple_script_0.4/frc_utilitaire/service.frc"
                        },
						{
							name: "frc_service.dll",
							url: "https://argentrocher.github.io/fr-simplecode/exemple_script_0.4/frc_utilitaire/frc_service.dll"
						});
                }
				filesToInclude.push(dossier);
			}

            // --- Fonction pour ajouter un fichier au ZIP ---
            async function addFileToZip(zip, filePath, fileData) {
                if (fileData.content) {
                    // Si c'est du texte
                    zip.file(filePath, fileData.content);
                } else if (fileData.url) {
                    // Si c'est un fichier binaire (ex: .exe, .pdf, etc.)
                    try {
                        const response = await fetch(fileData.url);
                        if (!response.ok) throw new Error(`Erreur : ${response.status}`);
                        const blob = await response.blob();
                        zip.file(filePath, blob, { binary: true });
                    } catch (error) {
                        console.error(`Impossible de télécharger ${fileData.url} :`, error);
                        // Ajoute un fichier texte avec l'erreur
                        zip.file(filePath, `Erreur : ${error.message}`);
                    }
                }
            }

            // --- Parcourir la liste et ajouter chaque fichier/dossier ---
            for (const item of filesToInclude) {
                if (item.files) {
                    // Si c'est un dossier
                    const folder = zip.folder(item.name);
                    for (const file of item.files) {
                        await addFileToZip(folder, file.name, file);
                    }
                } else {
                    // Si c'est un fichier
                    await addFileToZip(zip, item.name, item);
                }
            }

            // --- Générer et télécharger le ZIP ---
            zip.generateAsync({ type: "blob" })
                .then(content => {
                    saveAs(content, "fr-simplecode_pack0.4.1.zip");
                })
                .catch(error => {
                    console.error("Erreur lors de la génération du ZIP :", error);
                    alert("Une erreur est survenue. Voir la console pour plus de détails.");
                });
			//fermée
			closeDownloadWindow();
        }
		
		function openDownloadWindow(){
			document.getElementById("downloadModal").style.display="block";
		}

		function closeDownloadWindow(){
			document.getElementById("downloadModal").style.display="none";
		}
    </script>
</body>
</html>
